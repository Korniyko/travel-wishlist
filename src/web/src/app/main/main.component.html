  <app-header [theme]="theme()" (toggleNavigationPanel)="onToggleNavigationPanel()" />

  <core-navigation [items]="navigationItems()" [(expanded)]="navigationIsExpanded" />

  <footer>&copy; {{ year() }} Version 0.0.1</footer>
} @else {
  <core-spinner></core-spinner>
}
